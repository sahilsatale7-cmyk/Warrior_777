{% extends "base.html" %}

{% block title %}Login - Luxe Haven Resort{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h2><i class="fas fa-hotel"></i> Luxe Haven</h2>
        <p class="subtitle">Welcome back! Please login to continue.</p>

        <div class="auth-toggle">
            <button type="button" class="active" onclick="showForm('login')">Login</button>
            <button type="button" onclick="showForm('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" method="POST" action="{{ url_for('register') }}" style="display: none;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="+1 (555) 000-0000">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
            <a href="{{ url_for('admin_login') }}" style="color: var(--text-light); font-size: 0.9rem;">
                <i class="fas fa-shield-alt"></i> Admin Login
            </a>
        </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function showForm(form) {
    document.getElementById('login-form').style.display = form === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = form === 'register' ? 'block' : 'none';
    document.querySelectorAll('.auth-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === form);
    });
}
</script>
{% endblock %}
